<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Dirt Dudes</title>
<style>
:root{
  --bg:#0c0c12;--bg2:#15151e;--bg3:#1e1e2a;--bg4:#272733;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --or:#f97316;--or2:#fb923c;--bl:#38bdf8;--bl2:#7dd3fc;
  --tx:#f0f0f5;--tx2:#9a9aac;--tx3:#52526a;
  --gn:#22c55e;--rd:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);font-size:18px;-webkit-font-smoothing:antialiased;}
.app{max-width:480px;margin:0 auto;min-height:100vh;}

.hdr{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:env(safe-area-inset-top,0) 0 0;position:sticky;top:0;z-index:40;}
.hdr-in{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 16px;}
.logo{height:62px;object-fit:contain;}
.hdr-r{display:flex;align-items:center;gap:10px;}
.date{font-size:14px;color:var(--tx2);background:var(--bg3);border:1px solid var(--bdr2);border-radius:20px;padding:5px 12px;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--tx3);transition:all .3s;}
.dot.on{background:var(--gn);box-shadow:0 0 8px var(--gn);}
.dot.off{background:var(--rd);box-shadow:0 0 8px var(--rd);}

.tbar{display:flex;background:var(--bg2);border-top:1px solid var(--bdr);padding:6px 0 calc(6px + env(safe-area-inset-bottom,0));position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:40;}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;background:none;border:none;cursor:pointer;}
.tb-i{font-size:24px;line-height:1;filter:grayscale(1) opacity(.35);transition:filter .15s;}
.tb-l{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;transition:color .15s;}
.tb.on .tb-i{filter:none;}
.tb.on .tb-l{color:var(--or);}

.scr{display:none;padding:14px 14px 100px;}
.scr.on{display:block;}

.sec{font-size:13px;font-weight:700;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 10px;}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:6px 0 18px;}
.stat{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:14px 8px;text-align:center;}
.sv{font-size:34px;font-weight:700;line-height:1;}
.sv.rd{color:var(--rd);}
.sl{font-size:14px;color:var(--tx2);margin-top:4px;}

.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px;}
.card.warn{border-left:3px solid var(--rd);}
.cr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.cn{font-size:18px;font-weight:600;}
.cnum{font-size:15px;font-weight:400;color:var(--tx2);}
.cm{font-size:15px;color:var(--tx2);margin-top:5px;display:flex;gap:12px;flex-wrap:wrap;}
.cnote{font-size:15px;color:var(--tx3);margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr);font-style:italic;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.tag{font-size:14px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.tc{background:rgba(56,189,248,.1);color:var(--bl2);border:1px solid rgba(56,189,248,.18);}
.tok{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2);}
.tno{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);}
.tin{background:rgba(249,115,22,.12);color:var(--or2);border:1px solid rgba(249,115,22,.22);}
.bgs{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0;}
.ca{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;flex-wrap:wrap;}

.btn{border-radius:9px;padding:9px 16px;font-size:16px;font-weight:600;cursor:pointer;border:none;font-family:inherit;}
.btn:active{opacity:.65;}
.bor{background:var(--or);color:#fff;}
.bbl{background:rgba(56,189,248,.12);color:var(--bl);border:1px solid rgba(56,189,248,.22);}
.bgh{background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr2);}
.brd{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.18);}
.bgn{background:rgba(34,197,94,.12);color:var(--gn);border:1px solid rgba(34,197,94,.22);}
.bbig{width:100%;padding:15px;font-size:18px;font-weight:700;background:var(--or);color:#fff;border:none;border-radius:14px;cursor:pointer;font-family:inherit;margin-top:8px;}
.bbig:active{opacity:.8;}
.bbig.gh{background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr2);}

.fg{margin-bottom:14px;}
.fg label{display:block;font-size:16px;color:var(--tx2);margin-bottom:7px;font-weight:500;}
.fg input,.fg textarea{width:100%;padding:13px 15px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:9px;font-size:18px;font-family:inherit;color:var(--tx);outline:none;}
.fg input::placeholder,.fg textarea::placeholder{color:var(--tx3);}
.fg input:focus,.fg textarea:focus{border-color:var(--or);}
.fg textarea{height:76px;resize:none;}
.hint{font-size:14px;color:var(--tx3);font-weight:400;}

.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.copt{display:flex;align-items:center;gap:9px;background:var(--bg3);border:2px solid var(--bdr2);border-radius:9px;padding:11px 12px;cursor:pointer;font-size:16px;color:var(--tx2);transition:all .1s;user-select:none;}
.copt input{width:17px;height:17px;accent-color:var(--or);flex-shrink:0;cursor:pointer;}
.copt.sel{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.4);color:var(--or2);}

.wtog{display:flex;align-items:center;gap:13px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:9px;padding:14px 15px;cursor:pointer;width:100%;}
.wtog input{width:21px;height:21px;accent-color:var(--gn);flex-shrink:0;cursor:pointer;}
.wl{font-size:17px;font-weight:600;}
.ws{font-size:15px;color:var(--tx2);margin-top:2px;}

.sw{position:relative;margin-bottom:12px;}
.sw input{width:100%;padding:13px 15px 13px 42px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:9px;font-size:18px;font-family:inherit;color:var(--tx);outline:none;}
.sw input::placeholder{color:var(--tx3);}
.sw input:focus{border-color:var(--or);}
.si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:19px;pointer-events:none;}

.rpick{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:14px 15px;margin-bottom:8px;cursor:pointer;gap:8px;}
.rpick:active{border-color:var(--or);}
.rn{font-size:18px;font-weight:600;}
.rs{font-size:15px;color:var(--tx2);margin-top:3px;}
.rr{flex-shrink:0;}

.mwrap{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.mwrap.hide{display:none;}
.modal{background:var(--bg2);border-radius:22px 22px 0 0;border-top:1px solid var(--bdr2);width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:18px 18px calc(22px + env(safe-area-inset-bottom,0));}
.mh{width:38px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px;}
.mt{font-size:21px;font-weight:700;margin-bottom:16px;}
.mac{display:flex;gap:10px;margin-top:16px;}
.mac .bbig{margin-top:0;}

.mi{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:13px 15px;margin-bottom:8px;}
.mn{font-size:18px;font-weight:600;}
.mp{font-size:15px;color:var(--tx2);margin-top:2px;}
.qc{display:flex;align-items:center;gap:14px;}
.qb{width:34px;height:34px;border-radius:50%;border:1px solid var(--bdr2);background:var(--bg3);color:var(--tx);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qb:active{background:var(--bg4);}
.qn{font-size:19px;font-weight:700;min-width:18px;text-align:center;}

.oprev{background:var(--bg3);border:1px solid var(--bdr2);border-radius:14px;padding:13px;margin-bottom:14px;}
.opt{font-size:13px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.ol{display:flex;justify-content:space-between;font-size:16px;color:var(--tx2);margin-bottom:5px;}
.ol.tot{font-weight:700;color:var(--tx);border-top:1px solid var(--bdr);padding-top:8px;margin-top:5px;font-size:17px;}

.ocard{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:13px 15px;margin-bottom:10px;}
.oct{display:flex;justify-content:space-between;margin-bottom:8px;}
.ocn{font-size:17px;font-weight:600;}
.oct2{font-size:14px;color:var(--tx3);}
.oit{font-size:16px;color:var(--tx2);margin-bottom:10px;line-height:1.7;}
.sr{display:flex;gap:6px;flex-wrap:wrap;}
.sb{padding:7px 12px;border-radius:20px;font-size:14px;font-weight:600;border:1.5px solid transparent;cursor:pointer;font-family:inherit;opacity:.3;}
.sb.on{opacity:1;}
.sb.pending{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:#fbbf24;}
.sb.making{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3);color:var(--bl);}
.sb.ready{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--gn);}
.sb.delivered{background:rgba(255,255,255,.04);border-color:var(--bdr2);color:var(--tx3);}

.fr{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;}
.fb{padding:7px 13px;border-radius:20px;font-size:14px;font-weight:600;border:1px solid var(--bdr2);background:var(--bg3);color:var(--tx2);cursor:pointer;font-family:inherit;}
.fb.on{background:var(--or);border-color:var(--or);color:#fff;}

.wi{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid rgba(239,68,68,.18);border-radius:14px;padding:13px 15px;margin-bottom:8px;gap:8px;}
.win{font-size:17px;font-weight:600;}
.wis{font-size:15px;color:var(--tx2);margin-top:3px;}

.fab{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom,0));right:16px;width:56px;height:56px;border-radius:50%;background:var(--or);color:#fff;font-size:30px;border:none;cursor:pointer;z-index:100;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(249,115,22,.5);font-family:inherit;}
.fab.on{display:flex;}

.div{height:1px;background:var(--bdr);margin:16px 0;}
.rbtn{display:block;margin:16px auto 4px;background:none;border:1px solid rgba(239,68,68,.25);color:var(--rd);border-radius:9px;padding:11px 22px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx3);font-size:16px;line-height:1.8;}
.toast{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%);background:rgba(20,20,30,.97);color:var(--tx);border:1px solid var(--bdr2);padding:11px 20px;border-radius:30px;font-size:16px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;z-index:500;white-space:nowrap;}
.qh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.qct{font-size:15px;color:var(--tx3);}
.owrap{display:none;margin-top:8px;}
.owrap input{width:100%;padding:13px 15px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:9px;font-size:18px;font-family:inherit;color:var(--tx);outline:none;}
.owrap input:focus{border-color:var(--or);}
</style>
</head>

  var el=document.getElementById("xtoast");
  el.textContent=m; el.style.opacity=1;
  setTimeout(function(){ el.style.opacity=0; },2500);
}

// ── TABS ─────────────────────────────────────────────────────
document.querySelectorAll(".tb").forEach(function(btn){
  btn.addEventListener("click", function(){
    var tab = btn.getAttribute("data-tab");
    document.querySelectorAll(".scr").forEach(function(s){ s.classList.remove("on"); });
    document.querySelectorAll(".tb").forEach(function(b){ b.classList.remove("on"); });
    document.getElementById("s-"+tab).classList.add("on");
    btn.classList.add("on");
    var fab = document.getElementById("btn-add");
    fab.className = tab==="racers" ? "fab on" : "fab";
  });
});

// ── FILTER ───────────────────────────────────────────────────
document.querySelectorAll(".fb").forEach(function(btn){

    filt = btn.getAttribute("data-f");
    document.querySelectorAll(".fb").forEach(function(b){ b.classList.remove("on"); });
    btn.classList.add("on");
    drawOrders();

});

// ── SEARCH ───────────────────────────────────────────────────
document.getElementById("ci-q").addEventListener("input", drawCheckin);
document.getElementById("r-q").addEventListener("input", drawRacers);

// ── RESET ────────────────────────────────────────────────────
document.getElementById("btn-reset").addEventListener("click", function(){
  if(!confirm("Reset ALL check-ins and food orders for tonight?\n\nProfiles and waivers are NOT affected.")) return;
  db.ref("checkins").remove();
  db.ref("orders").remove();
  MENU.forEach(function(i){ cart[i.id]=0; });

  toast("Race night reset — profiles safe");

// ── ADD RACER FAB ─────────────────────────────────────────────
document.getElementById("btn-add").addEventListener("click", openAddRacer);

// ── PROFILE MODAL ─────────────────────────────────────────────
document.getElementById("mp-cancel").addEventListener("click", function(){ document.getElementById("m-profile").classList.add("hide"); });
document.getElementById("mp-save").addEventListener("click", saveProfile);

function openAddRacer(){
  document.getElementById("m-profile-title").textContent = "New Racer";
  document.getElementById("mp-key").value = "";
  document.getElementById("mp-name").value = "";
  document.getElementById("mp-car").value = "";
  document.getElementById("mp-tp").value = "";
  document.getElementById("mp-emg").value = "";
  document.getElementById("mp-notes").value = "";
  document.getElementById("mp-waiver").checked = false;
  buildGrid("mp-cgrid","mp-owrap","mp-oval",[]);
  document.getElementById("m-profile").classList.remove("hide");
}

function openEditRacer(key){
  var p=profiles[key]; if(!p) return;
  document.getElementById("m-profile-title").textContent = "Edit Racer";
  document.getElementById("mp-key").value = key;
  document.getElementById("mp-name").value = p.name||"";
  document.getElementById("mp-car").value = p.carnum||"";
  document.getElementById("mp-tp").value = p.transponder||"";
  document.getElementById("mp-emg").value = p.emergency||"";
  document.getElementById("mp-notes").value = p.notes||"";
  document.getElementById("mp-waiver").checked = !!p.waiver;
  buildGrid("mp-cgrid","mp-owrap","mp-oval",p.classes||[]);
  document.getElementById("m-profile").classList.remove("hide");
}

function saveProfile(){
  var name = document.getElementById("mp-name").value.trim();
  if(!name){ toast("Name is required"); return; }
  var classes = getClasses("mp-cgrid","mp-oval");
  var data = {
    name:name,
    carnum:document.getElementById("mp-car").value.trim(),
    transponder:document.getElementById("mp-tp").value.trim(),
    emergency:document.getElementById("mp-emg").value.trim(),
    notes:document.getElementById("mp-notes").value.trim(),
    waiver:document.getElementById("mp-waiver").checked,
    classes:classes
  };
  var key = document.getElementById("mp-key").value;
  if(key){
    db.ref("profiles/"+key).update(data);
    toast("Racer updated");
  } else {
    data.createdAt = Date.now();
    db.ref("profiles").push(data);
    toast(name+" added!");
  }
  document.getElementById("m-profile").classList.add("hide");
}

// ── CHECKIN MODAL ──────────────────────────────────────────────
document.getElementById("ci-cancel").addEventListener("click", function(){ document.getElementById("m-checkin").classList.add("hide"); });
document.getElementById("ci-confirm").addEventListener("click", confirmCheckin);

function openCheckin(key){
  var p=profiles[key]; if(!p) return;
  document.getElementById("m-ci-title").textContent = "Check In — "+p.name;
  document.getElementById("ci-key").value = key;
  buildGrid("ci-cgrid","ci-owrap","ci-oval",p.classes||[]);
  document.getElementById("m-checkin").classList.remove("hide");
}

function confirmCheckin(){
  var key = document.getElementById("ci-key").value;
  var p = profiles[key]; if(!p) return;
  var classes = getClasses("ci-cgrid","ci-oval");
  if(!classes.length){ toast("Select at least one class"); return; }
  db.ref("checkins/"+key).set({
    name:p.name, classes:classes,
    time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
    ts:Date.now()
  });
  toast(p.name+" checked in!");
  document.getElementById("m-checkin").classList.add("hide");
}

// ── CLASS GRID HELPERS ─────────────────────────────────────────
function buildGrid(gridId, wrapId, valId, selected){
  var grid = document.getElementById(gridId);
  var wrap = document.getElementById(wrapId);
  var oval = document.getElementById(valId);
  grid.innerHTML = "";
  var otherVal = "";
  selected.forEach(function(c){
    if(CLASSES.indexOf(c)===-1) otherVal = c;
  });
  CLASSES.forEach(function(c){
    var lbl = document.createElement("label");
    lbl.className = "copt" + (selected.indexOf(c)!==-1?" sel":"");
    var cb = document.createElement("input");
    cb.type = "checkbox";
    cb.value = c;
    if(selected.indexOf(c)!==-1) cb.checked = true;
    cb.addEventListener("change", function(){ lbl.classList.toggle("sel",cb.checked); });
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(" "+c));
    grid.appendChild(lbl);
  });
  // Other option
  var othLbl = document.createElement("label");
  othLbl.className = "copt" + (otherVal?" sel":"");
  var othCb = document.createElement("input");
  othCb.type = "checkbox";
  othCb.value = "Other";
  if(otherVal){ othCb.checked = true; wrap.style.display="block"; oval.value=otherVal; }
  else { wrap.style.display="none"; oval.value=""; }
  othCb.addEventListener("change", function(){
    othLbl.classList.toggle("sel",othCb.checked);
    wrap.style.display = othCb.checked ? "block" : "none";
  });
  othLbl.appendChild(othCb);
  othLbl.appendChild(document.createTextNode(" Other"));
  grid.appendChild(othLbl);
}

function getClasses(gridId, valId){
  var classes = [];
  document.querySelectorAll("#"+gridId+" input[type=checkbox]").forEach(function(cb){
    if(cb.checked && cb.value !== "Other") classes.push(cb.value);
  });
  var ov = document.getElementById(valId).value.trim();
  var othCb = document.querySelector("#"+gridId+" input[value=Other]");
  if(othCb && othCb.checked && ov) classes.push(ov);
  return classes;
}

// ── FOOD ──────────────────────────────────────────────────────
document.getElementById("btn-order").addEventListener("click", function(){
  var name = document.getElementById("fo-name").value.trim()||"Walk-up";
  var notes = document.getElementById("fo-notes").value.trim();
  var items = MENU.filter(function(i){ return cart[i.id]>0; }).map(function(i){
    return {name:i.name,qty:cart[i.id],price:i.price};
  });
  if(!items.length){ toast("Add at least one item"); return; }
  db.ref("orders").push({name:name,items:items,notes:notes,status:"pending",
    time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),ts:Date.now()});
  MENU.forEach(function(i){ cart[i.id]=0; });
  document.getElementById("fo-name").value="";
  document.getElementById("fo-notes").value="";
  document.getElementById("d-prev").style.display="none";
  drawMenu();
  toast("Order placed for "+name+"!");
});

function changeQty(id,d){
  cart[id]=Math.max(0,(cart[id]||0)+d);
  document.getElementById("q-"+id).textContent=cart[id];
  drawPreview();
}

function drawPreview(){
  var lines=MENU.filter(function(i){ return cart[i.id]>0; });
  var el=document.getElementById("d-prev");
  if(!lines.length){ el.style.display="none"; return; }
  el.style.display="block";
  var tot=lines.reduce(function(s,i){ return s+i.price*cart[i.id]; },0);
  document.getElementById("d-prev-lines").innerHTML =
    lines.map(function(i){
      return '<div class="ol"><span>'+i.name+' x'+cart[i.id]+'</span><span>$'+(i.price*cart[i.id]).toFixed(2)+'</span></div>';
    }).join("") +
    '<div class="ol tot"><span>Total</span><span>$'+tot.toFixed(2)+'</span></div>';
}

function setStatus(key,status){
  db.ref("orders/"+key).update({status:status});
}

// ── DRAW FUNCTIONS ────────────────────────────────────────────
function draw(){
  drawTonight();
  drawCheckin();
  drawRacers();
  drawWaivers();
}

function drawTonight(){
  var ci=Object.entries(checkins).sort(function(a,b){ return (a[1].ts||0)-(b[1].ts||0); });
  var ov=Object.values(orders);
  var nw=ci.filter(function(e){ return profiles[e[0]]&&!profiles[e[0]].waiver; });
  document.getElementById("s-tot").textContent=ci.length;
  document.getElementById("s-foodct").textContent=ov.filter(function(o){ return o.status!=="delivered"; }).length;
  document.getElementById("s-waiv").textContent=nw.length;
  var el=document.getElementById("d-lineup");
  if(!ci.length){ el.innerHTML='<div class="empty">Nobody checked in yet.</div>'; return; }
  el.innerHTML="";
  ci.forEach(function(e){
    var key=e[0],ci2=e[1],p=profiles[key]||{},wok=!!p.waiver;
    var div=document.createElement("div");
    div.className="card"+(wok?"":" warn");
    div.innerHTML =
      '<div class="cr">' +
        '<div>' +
          '<div class="cn">'+ci2.name+(p.carnum?' <span class="cnum">#'+p.carnum+'</span>':'')+'</div>' +
          '<div class="cm">'+(p.transponder?'<span>📡 '+p.transponder+'</span>':'')+'<span>🕐 '+ci2.time+'</span></div>' +
          '<div class="tags">'+(ci2.classes||[]).map(function(c){ return '<span class="tag tc">'+c+'</span>'; }).join("")+'</div>' +
        '</div>' +
        '<div class="bgs">'+(wok?'<span class="tag tok">✓ Waiver</span>':'<span class="tag tno">No Waiver</span>')+'</div>' +
      '</div>' +
      '<div class="ca"></div>';
    var removeBtn = document.createElement("button");
    removeBtn.className="btn brd";
    removeBtn.textContent="Remove";
    removeBtn.addEventListener("click", function(){
      if(!confirm("Remove this racer from tonight?")) return;
      db.ref("checkins/"+key).remove();
    });
    div.querySelector(".ca").appendChild(removeBtn);
    el.appendChild(div);
  });
}

function drawCheckin(){
  var q=(document.getElementById("ci-q").value||"").toLowerCase();
  var sorted=Object.entries(profiles).sort(function(a,b){ return a[1].name.localeCompare(b[1].name); });
  var filtered=q?sorted.filter(function(e){ return e[1].name.toLowerCase().indexOf(q)!==-1; }):sorted;
  var el=document.getElementById("d-checkin");
  if(!filtered.length){ el.innerHTML='<div class="empty">No racers found.</div>'; return; }
  el.innerHTML="";
  filtered.forEach(function(e){
    var key=e[0],p=e[1],inTonight=!!checkins[key];
    var div=document.createElement("div");
    div.className="rpick";
    var left=document.createElement("div");
    left.innerHTML='<div class="rn">'+p.name+(p.carnum?' <span style="color:var(--tx2);font-size:15px;font-weight:400;">#'+p.carnum+'</span>':'')+'</div>' +
      '<div class="rs">'+(p.transponder?'📡 '+p.transponder+' · ':'')+(p.waiver?'✅ Waiver on file':'⚠️ No waiver')+'</div>';
    var right=document.createElement("div");
    right.className="rr";
    if(inTonight){
      var badge=document.createElement("span");
      badge.className="tag tin"; badge.textContent="✓ In";
      right.appendChild(badge);
    } else {
      var ciBtn=document.createElement("button");
      ciBtn.className="btn bor"; ciBtn.textContent="Check In";
      ciBtn.addEventListener("click",function(){ openCheckin(key); });
      right.appendChild(ciBtn);
    }
    div.appendChild(left);
    div.appendChild(right);
    el.appendChild(div);
  });
}

function drawRacers(){
  var q=(document.getElementById("r-q").value||"").toLowerCase();
  var sorted=Object.entries(profiles).sort(function(a,b){ return a[1].name.localeCompare(b[1].name); });
  var filtered=q?sorted.filter(function(e){ return e[1].name.toLowerCase().indexOf(q)!==-1; }):sorted;
  var el=document.getElementById("d-racers");
  if(!filtered.length){ el.innerHTML='<div class="empty">No racers yet. Tap + to add.</div>'; return; }
  el.innerHTML="";
  filtered.forEach(function(e){
    var key=e[0],p=e[1];
    var div=document.createElement("div");
    div.className="card";
    var inner=document.createElement("div");
    inner.innerHTML=
      '<div class="cr">' +
        '<div>' +
          '<div class="cn">'+p.name+(p.carnum?' <span class="cnum">#'+p.carnum+'</span>':'')+'</div>' +
          '<div class="cm">'+(p.transponder?'<span>📡 '+p.transponder+'</span>':'')+(p.emergency?'<span>🆘 '+p.emergency+'</span>':'')+'</div>' +
          '<div class="tags">'+(p.classes||[]).map(function(c){ return '<span class="tag tc">'+c+'</span>'; }).join("")+'</div>' +
        '</div>' +
        '<div class="bgs">'+(p.waiver?'<span class="tag tok">✓ Waiver</span>':'<span class="tag tno">No Waiver</span>')+'</div>' +
      '</div>' +
      (p.notes?'<div class="cnote">'+p.notes+'</div>':'');
    div.appendChild(inner);
    var actions=document.createElement("div");
    actions.className="ca";

    var wBtn=document.createElement("button");
    wBtn.className="btn "+(p.waiver?"bgh":"bgn");
    wBtn.textContent=p.waiver?"Remove Waiver":"Mark Waiver";
    wBtn.addEventListener("click",function(){
      db.ref("profiles/"+key).update({waiver:!p.waiver});
      toast(p.waiver?"Waiver removed":"Waiver marked for "+p.name);
    });

    var eBtn=document.createElement("button");
    eBtn.className="btn bbl"; eBtn.textContent="Edit";
    eBtn.addEventListener("click",function(){ openEditRacer(key); });

    var dBtn=document.createElement("button");
    dBtn.className="btn brd"; dBtn.textContent="Delete";
    dBtn.addEventListener("click",function(){
      if(!confirm("Delete "+p.name+"? Cannot be undone.")) return;
      db.ref("profiles/"+key).remove();
      db.ref("checkins/"+key).remove();
      toast("Racer deleted");
    });

    actions.appendChild(wBtn);
    actions.appendChild(eBtn);
    actions.appendChild(dBtn);
    div.appendChild(actions);
    el.appendChild(div);
  });
}

function drawOrders(){
  var entries=Object.entries(orders).sort(function(a,b){ return (a[1].ts||0)-(b[1].ts||0); });
  var filtered=filt==="all"?entries:entries.filter(function(e){ return e[1].status===filt; });
  document.getElementById("d-qct").textContent=filtered.length+" order"+(filtered.length!==1?"s":"");
  var el=document.getElementById("d-orders");
  if(!filtered.length){ el.innerHTML='<div class="empty">No orders here.</div>'; return; }
  el.innerHTML="";
  filtered.forEach(function(e){
    var key=e[0],o=e[1];
    var div=document.createElement("div");
    div.className="ocard";
    var top=document.createElement("div");
    top.className="oct";
    top.innerHTML='<div class="ocn">'+o.name+'</div><div class="oct2">'+o.time+'</div>';
    var items=document.createElement("div");
    items.className="oit";
    items.innerHTML=(o.items||[]).map(function(i){ return i.name+' x'+i.qty; }).join('<br>')+(o.notes?'<br><em style="color:var(--tx3);">'+o.notes+'</em>':'');
    var sr=document.createElement("div");
    sr.className="sr";
    ["pending","making","ready","delivered"].forEach(function(s){
      var sb=document.createElement("button");
      sb.className="sb "+s+(o.status===s?" on":"");
      sb.textContent=SL[s];
      sb.addEventListener("click",function(){ db.ref("orders/"+key).update({status:s}); });
      sr.appendChild(sb);
    });
    div.appendChild(top);
    div.appendChild(items);
    div.appendChild(sr);
    el.appendChild(div);
  });
}

function drawWaivers(){
  var nw=Object.entries(profiles).filter(function(e){ return !e[1].waiver; }).sort(function(a,b){ return a[1].name.localeCompare(b[1].name); });
  var el=document.getElementById("d-waivers");
  if(!nw.length){ el.innerHTML='<div class="empty">Everyone has a waiver on file! 🎉</div>'; return; }
  el.innerHTML="";
  nw.forEach(function(e){
    var key=e[0],p=e[1];
    var div=document.createElement("div");
    div.className="wi";
    var info=document.createElement("div");
    info.innerHTML='<div class="win">'+p.name+'</div><div class="wis">'+((p.classes||[]).join(", ")||"No classes")+'</div>';
    var btn=document.createElement("button");
    btn.className="btn bgn"; btn.textContent="Mark Signed";
    btn.addEventListener("click",function(){
      db.ref("profiles/"+key).update({waiver:true});
      toast("Waiver marked for "+p.name);
    });
    div.appendChild(info);
    div.appendChild(btn);
    el.appendChild(div);
  });
}

function drawMenu(){
  var el=document.getElementById("d-menu");
  el.innerHTML="";
  MENU.forEach(function(item){
    var div=document.createElement("div");
    div.className="mi";
    var info=document.createElement("div");
    info.innerHTML='<div class="mn">'+item.name+'</div><div class="mp">$'+item.price.toFixed(2)+'</div>';
    var qc=document.createElement("div");
    qc.className="qc";
    var bm=document.createElement("button");
    bm.className="qb"; bm.textContent="−";
    bm.addEventListener("click",(function(id){ return function(){ changeQty(id,-1); }; })(item.id));
    var num=document.createElement("span");
    num.className="qn"; num.id="q-"+item.id; num.textContent="0";
    var bp=document.createElement("button");
    bp.className="qb"; bp.textContent="+";
    bp.addEventListener("click",(function(id){ return function(){ changeQty(id,1); }; })(item.id));
    qc.appendChild(bm); qc.appendChild(num); qc.appendChild(bp);
    div.appendChild(info); div.appendChild(qc);
    el.appendChild(div);
  });
}

// Init
document.getElementById("xdate").textContent = new Date().toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});
drawMenu();
draw();

})();
</script>
